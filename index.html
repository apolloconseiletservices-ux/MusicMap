<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicMap - Assistant Chef de Projet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            max-width: 1100px;
            width: 100%;
            background: #14121a;
            border-radius: 48px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid #2c2638;
            position: relative;
        }
        h1 {
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }
        h1 span {
            background: #2a1f3a;
            padding: 4px 18px;
            border-radius: 100px;
            font-size: 14px;
            color: #b389f0;
        }
        .sub {
            color: #a090b8;
            font-size: 16px;
            margin-bottom: 28px;
            border-left: 3px solid #7b4cbf;
            padding-left: 16px;
        }
        /* ===== MASCOOTTE ===== */
        .mascotte-banner {
            background: #1a1822;
            border-radius: 32px;
            padding: 20px 28px;
            margin-bottom: 30px;
            border: 1px solid #2c2638;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .mascotte-banner .avatar {
            font-size: 52px;
            animation: bob 1.2s infinite alternate;
        }
        @keyframes bob {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }
        .mascotte-banner .bubble {
            flex: 1;
        }
        .mascotte-banner .bubble strong {
            display: block;
            font-size: 18px;
            color: #b389f0;
        }
        .mascotte-banner .bubble p {
            color: #c0b0d8;
            font-size: 15px;
            margin-top: 4px;
        }
        /* ===== ÉTAPES ===== */
        .steps-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .step-card {
            background: #1e1a28;
            border-radius: 24px;
            padding: 20px 24px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .step-card.active {
            opacity: 1;
            border-color: #7b4cbf;
            background: #231d32;
            box-shadow: 0 0 30px rgba(123,76,191,0.15);
        }
        .step-card.done {
            opacity: 0.9;
            border-color: #3ccf8e;
            background: #1a2a24;
        }
        .step-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .step-num {
            width: 44px;
            height: 44px;
            border-radius: 40px;
            background: #2a243b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #8c78a3;
        }
        .step-card.done .step-num {
            background: #3ccf8e;
            color: #0b0a0f;
        }
        .step-info h4 {
            font-size: 18px;
            font-weight: 500;
        }
        .step-info p {
            font-size: 14px;
            color: #8977b0;
        }
        .step-badge {
            font-size: 13px;
            padding: 4px 16px;
            border-radius: 40px;
            background: #2a243b;
            color: #b389f0;
        }
        .step-badge.done {
            background: #3ccf8e;
            color: #0b0a0f;
        }
        /* ===== ZOOM ===== */
        .zoom-view {
            display: none;
            margin-top: 28px;
            background: #1a1822;
            border-radius: 32px;
            padding: 28px 24px;
            border: 1px solid #2c2638;
            animation: fadeSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .zoom-view.active {
            display: block;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(20px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .zoom-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .zoom-header h3 {
            font-size: 24px;
        }
        .zoom-header button {
            background: #2a243b;
            border: none;
            color: #fff;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .zoom-header button:hover {
            background: #3a2f50;
            transform: scale(1.05);
        }
        /* ===== POST-IT ===== */
        .task-item {
            background: #f9f3e8;
            color: #1a1a1a;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 0 #c9b99a, 0 12px 30px rgba(0,0,0,0.4);
            border-left: 8px solid #c9b99a;
            position: relative;
        }
        .task-item::after {
            content: '';
            position: absolute;
            top: -6px;
            right: 16px;
            width: 30px;
            height: 30px;
            background: #f9f3e8;
            border-radius: 0 0 12px 0;
            box-shadow: 4px -4px 0 #c9b99a;
            transform: rotate(2deg);
        }
        .task-item h4 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        .task-item p {
            font-size: 14px;
            color: #3d3d3d;
            margin-bottom: 8px;
        }
        .task-item .conseil {
            background: #f0ebd8;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            color: #2a243b;
            margin: 10px 0;
            border-left: 4px solid #7b4cbf;
        }
        .task-item .conseil strong {
            color: #1a1a1a;
        }
        .task-item textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #c9b99a;
            background: #fff;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            margin-top: 8px;
        }
        .task-item textarea:focus {
            outline: none;
            border-color: #7b4cbf;
        }
        .task-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .task-actions button {
            background: #2a243b;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .task-actions button:hover {
            transform: scale(1.05);
        }
        .task-actions button.validate {
            background: #7b4cbf;
        }
        .task-actions button.validate:hover {
            background: #9675dc;
        }
        .task-actions button.final {
            background: #3ccf8e;
            color: #0b0a0f;
        }
        .task-actions button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }
        .task-status {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 12px;
            background: #2a243b;
            color: #b389f0;
            margin-top: 6px;
        }
        .task-status.done {
            background: #3ccf8e;
            color: #0b0a0f;
        }
        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            margin-top: 40px;
            color: #4a3f5a;
            font-size: 13px;
            border-top: 1px solid #1a1822;
            padding-top: 24px;
        }
        @media (max-width: 600px) {
            .app { padding: 20px 16px; }
            .mascotte-banner { flex-direction: column; align-items: flex-start; }
            .step-card { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="app">
    <h1>🎵 MusicMap <span>Assistant</span></h1>
    <div class="sub">Votre chef de projet musical intelligent</div>

    <!-- Bannière mascotte -->
    <div class="mascotte-banner" id="mascotteBanner">
        <div class="avatar">🧑‍🚀</div>
        <div class="bubble">
            <strong id="mascotteTitle">Bonjour !</strong>
            <p id="mascotteMessage">Je suis votre assistant. Cliquez sur une étape pour commencer.</p>
        </div>
    </div>

    <!-- Liste des étapes -->
    <div class="steps-grid" id="stepsContainer"></div>

    <!-- Zone zoom -->
    <div class="zoom-view" id="zoomView">
        <div class="zoom-header">
            <h3 id="zoomTitle">Étape 1</h3>
            <button onclick="closeZoom()">✕ Retour</button>
        </div>
        <div id="taskContainer"></div>
    </div>

    <footer>© 2026 MusicMap — Assistant intégré</footer>
</div>

<script>
    // ============================================================
    // DONNÉES AVEC CONSEILS ET QUESTIONS
    // ============================================================
    const projectData = [{
        id: 1,
        title: "🎤 Identité artistique",
        desc: "Nom, genre, image",
        tasks: [{
            id: "1.1",
            instruction: "Quel est ton nom de scène ?",
            conseil: "Choisis un nom court, mémorable, et vérifie qu'il n'est pas déjà utilisé sur Spotify/Instagram.",
            placeholder: "Ex: Lune Électrique"
        }, {
            id: "1.2",
            instruction: "Quel est ton genre musical principal ?",
            conseil: "Sois précis : 'Pop alternative' ou 'Hip-hop lo-fi' attirent plus facilement les playlists.",
            placeholder: "Ex: Pop alternative"
        }, {
            id: "1.3",
            instruction: "As-tu déjà une photo ou un logo ?",
            conseil: "Si non, utilise Canva (gratuit) pour créer un visuel simple avec ton nom.",
            placeholder: "Oui / Non, je vais en créer"
        }]
    }, {
        id: 2,
        title: "🎬 Musique & production",
        desc: "Fichiers, mix, mastering",
        tasks: [{
            id: "2.1",
            instruction: "As-tu un fichier audio final (WAV/MP3) ?",
            conseil: "Le WAV est préférable pour les plateformes. Si tu n'as que du MP3, c'est acceptable.",
            placeholder: "Oui / Non"
        }, {
            id: "2.2",
            instruction: "As-tu les crédits complets ? (paroliers, producteurs, featuring)",
            conseil: "Ces infos sont obligatoires pour les plateformes. Fais une liste simple.",
            placeholder: "Liste des crédits..."
        }, {
            id: "2.3",
            instruction: "As-tu validé le mix/master définitif ?",
            conseil: "Si tu hésites, fais écouter à 2-3 personnes de confiance avant de valider.",
            placeholder: "Oui / Non, je vais le faire"
        }]
    }, {
        id: 3,
        title: "🎨 Visuels & habillage",
        desc: "Pochette, teaser, photos",
        tasks: [{
            id: "3.1",
            instruction: "As-tu une pochette carrée (3000x3000 px) ?",
            conseil: "Utilise Canva ou Adobe Express pour en créer une facilement.",
            placeholder: "Oui / Non"
        }, {
            id: "3.2",
            instruction: "As-tu un visuel animé (Spotify Canvas) ?",
            conseil: "Une vidéo de 3-8 secondes en boucle augmente l'engagement de 20%.",
            placeholder: "Oui / Non"
        }, {
            id: "3.3",
            instruction: "As-tu des photos presse ?",
            conseil: "3 photos pro ou semi-pro suffisent. Une en noir & blanc, une en couleur.",
            placeholder: "Oui / Non"
        }]
    }, {
        id: 4,
        title: "📢 Promotion & réseaux",
        desc: "TikTok, Instagram, presse",
        tasks: [{
            id: "4.1",
            instruction: "As-tu un compte TikTok actif ?",
            conseil: "Publie 3 vidéos teaser avant la sortie. Montre les coulisses.",
            placeholder: "Oui / Non"
        }, {
            id: "4.2",
            instruction: "As-tu préparé un dossier de presse ?",
            conseil: "Une page avec : bio, photo, liens, 2-3 anecdotes sur le titre.",
            placeholder: "Oui / Non"
        }, {
            id: "4.3",
            instruction: "As-tu une liste de contacts (presse, blogueurs) ?",
            conseil: "Cherche 10 blogueurs spécialisés dans ton genre. Envoie-leur un pitch personnalisé.",
            placeholder: "Liste de contacts..."
        }]
    }, {
        id: 5,
        title: "🚀 Lancement",
        desc: "Publication, emailing",
        tasks: [{
            id: "5.1",
            instruction: "As-tu vérifié que la musique est bien en ligne partout ?",
            conseil: "Spotify, Apple Music, Deezer, YouTube. Vérifie chaque plateforme.",
            placeholder: "Oui / Non"
        }, {
            id: "5.2",
            instruction: "As-tu programmé des posts sur les réseaux ?",
            conseil: "Programme 5 posts sur 5 jours : annonce, teaser, sortie, remerciements, making-of.",
            placeholder: "Oui / Non"
        }, {
            id: "5.3",
            instruction: "As-tu envoyé un email à ta newsletter ?",
            conseil: "Un email simple avec un lien d'écoute et un visuel accrocheur.",
            placeholder: "Oui / Non"
        }]
    }, {
        id: 6,
        title: "📊 Bilan & suite",
        desc: "Chiffres, retours, prochain projet",
        tasks: [{
            id: "6.1",
            instruction: "As-tu regardé tes chiffres (streams, vues) ?",
            conseil: "Analyse les 7 premiers jours. Note ce qui a le mieux marché.",
            placeholder: "Oui / Non"
        }, {
            id: "6.2",
            instruction: "As-tu recueilli des retours ?",
            conseil: "Demande à 5 personnes ce qu'elles ont aimé / moins aimé.",
            placeholder: "Retours..."
        }, {
            id: "6.3",
            instruction: "As-tu archivé tous les livrables ?",
            conseil: "Conserve tout (fichiers, visuels, contacts) pour le prochain projet.",
            placeholder: "Oui / Non"
        }]
    }];

    // ============================================================
    // ÉTAT
    // ============================================================
    let state = {};
    let currentStepId = null;

    function initState() {
        projectData.forEach(step => {
            state[step.id] = {};
            step.tasks.forEach(task => {
                state[step.id][task.id] = { status: 'todo', answer: '' };
            });
        });
    }

    function loadState() {
        try {
            const saved = sessionStorage.getItem('musicMapState');
            if (saved) {
                state = JSON.parse(saved);
                projectData.forEach(step => {
                    if (!state[step.id]) state[step.id] = {};
                    step.tasks.forEach(task => {
                        if (!state[step.id][task.id]) {
                            state[step.id][task.id] = { status: 'todo', answer: '' };
                        }
                    });
                });
            } else {
                initState();
            }
        } catch(e) {
            initState();
        }
    }

    function saveState() {
        try {
            sessionStorage.setItem('musicMapState', JSON.stringify(state));
        } catch(e) {}
    }

    // ============================================================
    // RENDU ÉTAPES
    // ============================================================
    function renderSteps() {
        const container = document.getElementById('stepsContainer');
        container.innerHTML = '';
        projectData.forEach(step => {
            const stepTasks = step.tasks;
            let done = 0;
            stepTasks.forEach(t => {
                const s = state[step.id]?.[t.id]?.status;
                if (s === 'done' || s === 'final') done++;
            });
            const allDone = done === stepTasks.length;
            const isActive = currentStepId === step.id;

            const card = document.createElement('div');
            card.className = 'step-card' + (allDone ? ' done' : '') + (isActive ? ' active' : '');
            card.innerHTML = `
                <div class="step-left">
                    <div class="step-num">${step.id}</div>
                    <div class="step-info">
                        <h4>${step.title}</h4>
                        <p>${step.desc}</p>
                    </div>
                </div>
                <div class="step-badge ${allDone ? 'done' : ''}">${allDone ? '✅ Terminé' : done+'/'+stepTasks.length}</div>
            `;
            card.onclick = () => openZoom(step.id);
            container.appendChild(card);
        });
    }

    // ============================================================
    // ZOOM
    // ============================================================
    function openZoom(stepId) {
        currentStepId = stepId;
        const step = projectData.find(s => s.id === stepId);
        if (!step) return;
        document.getElementById('zoomTitle').textContent = step.title;
        document.getElementById('zoomView').classList.add('active');
        renderTasks(step);
        updateMascotte(step);
        document.getElementById('zoomView').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeZoom() {
        currentStepId = null;
        document.getElementById('zoomView').classList.remove('active');
        document.getElementById('mascotteTitle').textContent = 'Bonjour !';
        document.getElementById('mascotteMessage').textContent = 'Cliquez sur une étape pour commencer.';
        document.getElementById('etapes').scrollIntoView({ behavior: 'smooth' });
    }

    // ============================================================
    // RENDU TÂCHES (POST-IT)
    // ============================================================
    function renderTasks(step) {
        const container = document.getElementById('taskContainer');
        container.innerHTML = '';
        let previousDone = true;

        step.tasks.forEach((task, idx) => {
            const taskState = state[step.id]?.[task.id] || { status: 'todo', answer: '' };
            const isActive = previousDone && (taskState.status === 'todo' || taskState.status === 'doing');
            const isDone = taskState.status === 'done' || taskState.status === 'final';
            const isFinal = taskState.status === 'final';

            const div = document.createElement('div');
            div.className = 'task-item';

            const statusLabel = isFinal ? '✅ Définitif' : isDone ? '✔️ Terminé' : isActive ? '⏳ En cours' : '⏹️ Bloqué';

            div.innerHTML = `
                <h4>${task.instruction}</h4>
                ${task.conseil ? `<div class="conseil"><strong>💡 Conseil :</strong> ${task.conseil}</div>` : ''}
                <textarea placeholder="${task.placeholder || 'Écris ta réponse...'}">${taskState.answer || ''}</textarea>
                <div>
                    <span class="task-status ${isDone ? 'done' : ''}">${statusLabel}</span>
                </div>
                <div class="task-actions">
                    ${!isFinal ? `
                        <button ${isActive ? '' : 'disabled'} class="validate" onclick="doTask(${step.id}, ${idx}, 'done')">✔️ Terminer</button>
                        <button ${isActive ? '' : 'disabled'} class="final" onclick="doTask(${step.id}, ${idx}, 'final')">🔒 Définitif</button>
                    ` : `
                        <span style="color:#3ccf8e;">✅ Tâche verrouillée</span>
                    `}
                </div>
            `;
            container.appendChild(div);

            // Sauvegarde automatique de la réponse
            const textarea = div.querySelector('textarea');
            textarea.addEventListener('input', function() {
                taskState.answer = this.value;
                saveState();
            });

            if (!isDone) previousDone = false;
        });
    }

    // ============================================================
    // ACTIONS
    // ============================================================
    function doTask(stepId, taskIdx, status) {
        const step = projectData.find(s => s.id === stepId);
        if (!step) return;
        const task = step.tasks[taskIdx];
        if (!task) return;
        const taskState = state[stepId]?.[task.id];
        if (!taskState) return;

        if (taskIdx > 0) {
            const prevTask = step.tasks[taskIdx - 1];
            const prevState = state[stepId]?.[prevTask.id];
            if (prevState && prevState.status !== 'final' && prevState.status !== 'done') {
                alert('Termine d\'abord la tâche précédente.');
                return;
            }
        }

        // Vérifier que la réponse n'est pas vide
        if (taskState.answer.trim() === '') {
            alert('Merci de répondre à la question avant de valider.');
            return;
        }

        taskState.status = status;
        saveState();
        if (currentStepId === stepId) renderTasks(step);
        renderSteps();
        updateMascotte(step);
    }

    // ============================================================
    // MASCOOTTE DYNAMIQUE
    // ============================================================
    function updateMascotte(step) {
        const title = document.getElementById('mascotteTitle');
        const msg = document.getElementById('mascotteMessage');
        const done = step.tasks.filter(t => {
            const s = state[step.id]?.[t.id]?.status;
            return s === 'done' || s === 'final';
        }).length;
        const total = step.tasks.length;

        if (done === total) {
            title.textContent = '🎉 Étape terminée !';
            msg.textContent = 'Bravo ! Tu as validé toutes les tâches de cette étape. Passe à la suivante.';
        } else if (done === 0) {
            title.textContent = '📌 Nouvelle étape';
            msg.textContent = `Commençons par la première tâche : ${step.tasks[0].instruction}`;
        } else {
            title.textContent = '⏳ Continue comme ça';
            msg.textContent = `Tu as validé ${done}/${total} tâches. La prochaine : ${step.tasks[done].instruction}`;
        }
    }

    // ============================================================
    // INIT
    // ============================================================
    loadState();
    renderSteps();
    console.log('🎵 MusicMap Assistant chargé');
</script>
</body>
</html>
