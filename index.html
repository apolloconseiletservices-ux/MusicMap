<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicMap - Chef de Projet Musical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: #0b0a0f; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; color: #fff; }
        .app { max-width: 900px; width: 100%; background: #14121a; border-radius: 40px; padding: 30px 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px #2c2638 inset; }
        h1 { font-size: 28px; font-weight: 600; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; }
        h1 span { background: #2a1f3a; padding: 4px 14px; border-radius: 100px; font-size: 14px; color: #b389f0; }
        .sub { color: #a090b8; font-size: 14px; margin-bottom: 25px; border-left: 3px solid #7b4cbf; padding-left: 16px; }
        .jauge { height: 10px; background: #2a243b; border-radius: 40px; margin: 15px 0 20px; overflow: hidden; }
        .jauge-fill { height: 100%; width: 0%; background: linear-gradient(to right, #7b4cbf, #3ccf8e); transition: 0.3s; }
        .steps-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .step-card { background: #1e1a28; border-radius: 20px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border: 1px solid transparent; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .step-card.active { opacity: 1; border-color: #7b4cbf; background: #231d32; box-shadow: 0 0 20px #7b4cbf22; }
        .step-card.done { opacity: 0.9; border-color: #3ccf8e; background: #1a2a24; }
        .step-card.done .step-num { background: #3ccf8e; color: #0b0a0f; }
        .step-left { display: flex; align-items: center; gap: 16px; flex: 1; }
        .step-num { width: 44px; height: 44px; border-radius: 40px; background: #2a243b; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #8c78a3; flex-shrink: 0; }
        .step-info h4 { font-size: 16px; font-weight: 500; }
        .step-info p { font-size: 13px; color: #8977b0; margin: 0; }
        .step-badge { font-size: 12px; padding: 4px 12px; border-radius: 40px; background: #2a243b; color: #b389f0; }
        .step-badge.done { background: #3ccf8e; color: #0b0a0f; }
        .zoom-view { display: none; margin-top: 20px; background: #1a1822; border-radius: 24px; padding: 20px; border: 1px solid #2c2638; animation: fadeIn 0.4s; }
        .zoom-view.active { display: block; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .zoom-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .zoom-header h3 { font-size: 20px; }
        .zoom-header button { background: #2a243b; border: none; color: #fff; padding: 6px 18px; border-radius: 40px; cursor: pointer; font-size: 14px; }
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-item { background: #14121a; border-radius: 16px; padding: 14px 18px; border-left: 5px solid #555; display: flex; flex-direction: column; gap: 6px; opacity: 0.6; transition: 0.2s; }
        .task-item.active-task { opacity: 1; border-left-color: #7b4cbf; }
        .task-item.done-task { opacity: 0.9; border-left-color: #3ccf8e; }
        .task-item.orange-task { border-left-color: #f5a623; }
        .task-item.red-task { border-left-color: #e74c3c; }
        .task-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
        .task-top h4 { font-size: 15px; font-weight: 500; }
        .task-top .task-status { font-size: 12px; padding: 2px 12px; border-radius: 40px; background: #2a243b; color: #b389f0; }
        .task-top .task-status.done { background: #3ccf8e; color: #0b0a0f; }
        .task-instruction { font-size: 13px; color: #a090b8; }
        .task-timer { font-size: 13px; font-weight: 600; color: #b389f0; }
        .task-actions { display: flex; gap: 10px; margin-top: 6px; flex-wrap: wrap; }
        .task-actions button { background: #2a243b; border: none; color: #fff; padding: 6px 16px; border-radius: 40px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .task-actions button:hover { background: #3a2f50; }
        .task-actions button.validate { background: #7b4cbf; }
        .task-actions button.validate:hover { background: #9675dc; }
        .task-actions button.final { background: #3ccf8e; color: #0b0a0f; }
        .task-actions button:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .mascotte-popup { position: fixed; bottom: 30px; right: 30px; background: #1e1a28; border: 1px solid #7b4cbf; border-radius: 24px; padding: 20px 24px; max-width: 320px; color: #fff; display: none; z-index: 999; animation: slideIn 0.6s; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .mascotte-popup.active { display: block; }
        @keyframes slideIn { 0% { transform: translateX(100px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
        .mascotte-popup .mascotte-emoji { font-size: 40px; text-align: center; }
        .mascotte-popup .mascotte-msg { font-size: 14px; margin: 10px 0; text-align: center; color: #c0b0d8; }
        .mascotte-popup .mascotte-btn { background: #7b4cbf; border: none; color: #fff; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; display: block; margin: 0 auto; }
        @media (max-width: 600px) { .app { padding: 16px; } .step-card { flex-wrap: wrap; } .mascotte-popup { right: 10px; left: 10px; max-width: unset; } }
    </style>
</head>
<body>

<div class="app">
    <h1>🎵 MusicMap <span>V2.1</span></h1>
    <div class="sub">Chef de projet musical automatisé — 6 étapes clés</div>
    <div class="jauge"><div class="jauge-fill" id="globalProgress"></div></div>

    <div id="macroView">
        <div class="steps-grid" id="stepsContainer"></div>
    </div>

    <div class="zoom-view" id="zoomView">
        <div class="zoom-header">
            <h3 id="zoomTitle">Étape 1</h3>
            <button onclick="closeZoom()">✕ Retour</button>
        </div>
        <div class="task-list" id="taskContainer"></div>
    </div>
</div>

<div class="mascotte-popup" id="mascottePopup">
    <div class="mascotte-emoji">🧑‍🚀</div>
    <div class="mascotte-msg" id="mascotteMsg">Alors, on avance ?</div>
    <button class="mascotte-btn" onclick="closeMascotte()">Compris !</button>
</div>

<script>
    // ===== DONNÉES =====
    const projectData = [
        { id: 1, title: "📱 Comprendre & s'engager", desc: "Fiche artiste, accord, accès", tasks: [
            { id: "1.1", instruction: "Remplis ta fiche artiste (nom, genre, liens)", duration: 2 },
            { id: "1.2", instruction: "Signe l'accord de planning (valide les délais)", duration: 1 },
            { id: "1.3", instruction: "Donne les accès à tes comptes (Spotify, Insta...)", duration: 1 }
        ]},
        { id: 2, title: "🎬 Préparer la musique", desc: "Fichier final, infos, validation", tasks: [
            { id: "2.1", instruction: "Envoie le fichier audio final (WAV/MP3)", duration: 3 },
            { id: "2.2", instruction: "Remplis les infos du titre (titre, featuring, durée)", duration: 1 },
            { id: "2.3", instruction: "Valide le son définitif (mix/master)", duration: 2 }
        ]},
        { id: 3, title: "🎨 Créer l'habillage", desc: "Pochette, visuels, teaser", tasks: [
            { id: "3.1", instruction: "Valide la pochette (carrée, format plateformes)", duration: 3 },
            { id: "3.2", instruction: "Fournis une photo ou vidéo teaser", duration: 2 },
            { id: "3.3", instruction: "Valide l'image finale", duration: 2 }
        ]},
        { id: 4, title: "📢 Lancer la promo", desc: "Comptes, vidéos, dossier presse", tasks: [
            { id: "4.1", instruction: "Vérifie tes comptes TikTok/Insta/Spotify", duration: 2 },
            { id: "4.2", instruction: "Prépare 3 vidéos pour annoncer", duration: 4 },
            { id: "4.3", instruction: "Envoie le dossier à des contacts (presse, blog)", duration: 3 }
        ]},
        { id: 5, title: "🚀 Sortir le titre", desc: "Vérification, publications, emailing", tasks: [
            { id: "5.1", instruction: "Vérifie que la musique est bien en ligne partout", duration: 1 },
            { id: "5.2", instruction: "Publie les annonces sur les réseaux", duration: 1 },
            { id: "5.3", instruction: "Envoie un email à tes fans", duration: 1 }
        ]},
        { id: 6, title: "📊 Faire le bilan", desc: "Chiffres, retours, clôture", tasks: [
            { id: "6.1", instruction: "Regarde les chiffres (streams, vues)", duration: 2 },
            { id: "6.2", instruction: "Recueille les retours", duration: 2 },
            { id: "6.3", instruction: "Valide la clôture du projet", duration: 1 }
        ]}
    ];

    // ===== ÉTAT =====
    let state = {};
    let currentStepId = null;
    let mascotteTimer = null;
    let timerInterval = null;

    function initState() {
        projectData.forEach(step => {
            state[step.id] = {};
            step.tasks.forEach(task => {
                state[step.id][task.id] = {
                    status: 'todo',
                    comment: '',
                    startTime: null
                };
            });
        });
    }

    function loadState() {
        try {
            const saved = sessionStorage.getItem('musicMapState');
            if (saved) {
                state = JSON.parse(saved);
                // Vérifier que toutes les tâches existent
                projectData.forEach(step => {
                    if (!state[step.id]) state[step.id] = {};
                    step.tasks.forEach(task => {
                        if (!state[step.id][task.id]) {
                            state[step.id][task.id] = { status: 'todo', comment: '', startTime: null };
                        }
                    });
                });
            } else {
                initState();
            }
        } catch(e) {
            initState();
        }
    }

    function saveState() {
        try {
            sessionStorage.setItem('musicMapState', JSON.stringify(state));
        } catch(e) {}
    }

    // ===== RENDU =====
    function renderMacro() {
        const container = document.getElementById('stepsContainer');
        container.innerHTML = '';
        let totalDone = 0;
        let totalTasks = 0;
        let doneTasks = 0;

        projectData.forEach(step => {
            const stepTasks = step.tasks;
            totalTasks += stepTasks.length;
            let stepDone = 0;
            stepTasks.forEach(task => {
                const s = state[step.id]?.[task.id]?.status;
                if (s === 'done' || s === 'final') stepDone++;
            });
            doneTasks += stepDone;
            const allDone = stepDone === stepTasks.length;
            if (allDone) totalDone++;
            const isActive = currentStepId === step.id;

            const card = document.createElement('div');
            card.className = 'step-card' + (allDone ? ' done' : '') + (isActive ? ' active' : '');
            card.innerHTML = `
                <div class="step-left">
                    <div class="step-num">${step.id}</div>
                    <div class="step-info">
                        <h4>${step.title}</h4>
                        <p>${step.desc}</p>
                    </div>
                </div>
                <div class="step-badge ${allDone ? 'done' : ''}">${allDone ? '✅ Terminé' : stepDone+'/'+stepTasks.length}</div>
            `;
            card.onclick = () => openZoom(step.id);
            container.appendChild(card);
        });

        const pct = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
        document.getElementById('globalProgress').style.width = pct + '%';
    }

    function openZoom(stepId) {
        if (timerInterval) clearInterval(timerInterval);
        currentStepId = stepId;
        const step = projectData.find(s => s.id === stepId);
        if (!step) return;
        document.getElementById('zoomTitle').textContent = step.title;
        document.getElementById('macroView').style.display = 'none';
        document.getElementById('zoomView').classList.add('active');
        renderTasks(step);
        // Lancer le timer de mise à jour toutes les 10 secondes
        timerInterval = setInterval(() => {
            if (currentStepId) {
                const s = projectData.find(p => p.id === currentStepId);
                if (s) renderTasks(s);
            }
        }, 10000);
    }

    function closeZoom() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        currentStepId = null;
        document.getElementById('macroView').style.display = 'block';
        document.getElementById('zoomView').classList.remove('active');
        renderMacro();
    }

    function renderTasks(step) {
        const container = document.getElementById('taskContainer');
        container.innerHTML = '';
        let previousDone = true;

        step.tasks.forEach((task, idx) => {
            const taskState = state[step.id]?.[task.id] || { status: 'todo', comment: '', startTime: null };
            const isActive = previousDone && (taskState.status === 'todo' || taskState.status === 'doing');
            const isDone = taskState.status === 'done' || taskState.status === 'final';
            const isFinal = taskState.status === 'final';

            // Calcul du temps écoulé
            let elapsedDays = 0;
            let timeDisplay = '';
            if (taskState.startTime) {
                const elapsedMs = Date.now() - taskState.startTime;
                elapsedDays = elapsedMs / (1000 * 60 * 60 * 24);
                const remaining = Math.max(0, task.duration * 24 * 60 * 60 * 1000 - elapsedMs);
                const days = Math.floor(remaining / (1000 * 60 * 60 * 24));
                const hours = Math.floor((remaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));
                timeDisplay = `⏱️ Temps restant : ${days}j ${hours}h ${minutes}m`;
            } else if (isDone && !isFinal) {
                timeDisplay = '✅ Tâche terminée (modifiable)';
            } else if (isFinal) {
                timeDisplay = '🔒 Tâche définitivement validée';
            } else {
                timeDisplay = `⏱️ Durée estimée : ${task.duration} jour${task.duration>1?'s':''}`;
            }

            const isLate = elapsedDays > task.duration && !isDone;
            const isAlmostLate = elapsedDays >= task.duration * 0.8 && !isLate && !isDone;

            const div = document.createElement('div');
            div.className = 'task-item';
            if (isDone) div.classList.add('done-task');
            else if (isActive) div.classList.add('active-task');
            if (isLate && !isDone) div.classList.add('red-task');
            else if (isAlmostLate && !isDone) div.classList.add('orange-task');

            const statusLabel = isFinal ? '✅ Définitif' : isDone ? '✔️ Terminé' : isActive ? '⏳ En cours' : '⏹️ Bloqué';

            div.innerHTML = `
                <div class="task-top">
                    <h4>Tâche ${task.id}</h4>
                    <span class="task-status ${isDone ? 'done' : ''}">${statusLabel}</span>
                </div>
                <div class="task-instruction">📌 ${task.instruction}</div>
                <div class="task-timer">${timeDisplay}</div>
                ${taskState.comment ? `<div style="font-size:13px;color:#b389f0;">💬 ${taskState.comment}</div>` : ''}
                <div class="task-actions">
                    ${!isFinal ? `
                        <button ${isActive ? '' : 'disabled'} class="validate" onclick="doTask(${step.id}, '${task.id}', 'done')">✔️ Terminer</button>
                        <button ${isActive ? '' : 'disabled'} onclick="doTask(${step.id}, '${task.id}', 'final')" class="final">🔒 Terminer définitif</button>
                        <button onclick="addComment(${step.id}, '${task.id}')">💬 Commentaire</button>
                    ` : `
                        <span style="color:#3ccf8e;">✅ Tâche définitivement validée</span>
                        <button onclick="requestRevert(${step.id}, '${task.id}')">↩️ Demander retour admin</button>
                    `}
                </div>
                ${isLate && !isDone ? `<div style="color:#e74c3c;font-size:13px;margin-top:4px;">⚠️ Retard ! Cette tâche est en dépassement.</div>` : ''}
                ${isAlmostLate && !isLate && !isDone ? `<div style="color:#f5a623;font-size:13px;margin-top:4px;">⏳ Attention, bientôt en retard.</div>` : ''}
            `;
            container.appendChild(div);
            if (!isDone) previousDone = false;
        });
    }

    // ===== ACTIONS =====
    function doTask(stepId, taskId, status) {
        const step = projectData.find(s => s.id === stepId);
        if (!step) return;
        const task = step.tasks.find(t => t.id === taskId);
        if (!task) return;
        const taskState = state[stepId]?.[taskId];
        if (!taskState) return;

        // Vérifier la tâche précédente
        const idx = step.tasks.indexOf(task);
        if (idx > 0) {
            const prevTask = step.tasks[idx - 1];
            const prevState = state[stepId]?.[prevTask.id];
            if (prevState && prevState.status !== 'final' && prevState.status !== 'done') {
                showMascotte('⛔ Bloqué', 'Termine d\'abord la tâche précédente.');
                return;
            }
        }

        if (taskState.status === 'todo' && status !== 'final') {
            taskState.startTime = Date.now();
        }
        taskState.status = status;

        if (status === 'done') showMascotte('✅ Bien joué', 'Tâche terminée !');
        else if (status === 'final') showMascotte('🔒 Validé définitif', 'Tâche verrouillée.');

        // Vérifier si l'étape est complète
        const allFinal = step.tasks.every(t => {
            const s = state[stepId]?.[t.id];
            return s && (s.status === 'final' || s.status === 'done');
        });
        if (allFinal) showMascotte('🎉 Étape complète', 'Toutes les tâches sont validées !');

        saveState();
        if (currentStepId === stepId) renderTasks(step);
        renderMacro();
    }

    function addComment(stepId, taskId) {
        const taskState = state[stepId]?.[taskId];
        if (!taskState) return;
        const comment = prompt('Ajoute un commentaire :', taskState.comment || '');
        if (comment !== null) {
            taskState.comment = comment;
            saveState();
            const step = projectData.find(s => s.id === stepId);
            if (step && currentStepId === stepId) renderTasks(step);
        }
    }

    function requestRevert(stepId, taskId) {
        if (confirm('Demander à l\'administrateur de déverrouiller cette tâche ?')) {
            const email = 'admin@musicmap.com';
            const subject = encodeURIComponent('Demande retour - Tâche ' + taskId);
            const body = encodeURIComponent('Bonjour,\n\nJe souhaite revenir sur la tâche ' + taskId + '.\n\nMerci de la déverrouiller.\n\nClient MusicMap.');
            window.location.href = 'mailto:' + email + '?subject=' + subject + '&body=' + body;
            showMascotte('📩 Demande envoyée', 'Email ouvert pour l\'admin.');
        }
    }

    // ===== MASCOOTTE =====
    function showMascotte(title, msg) {
        const popup = document.getElementById('mascottePopup');
        document.getElementById('mascotteMsg').innerHTML = `<strong>${title}</strong><br>${msg}`;
        popup.classList.add('active');
        if (mascotteTimer) clearTimeout(mascotteTimer);
        mascotteTimer = setTimeout(() => popup.classList.remove('active'), 8000);
    }

    function closeMascotte() {
        document.getElementById('mascottePopup').classList.remove('active');
        if (mascotteTimer) clearTimeout(mascotteTimer);
    }

    // ===== INIT =====
    loadState();
    renderMacro();
    document.getElementById('macroView').style.display = 'block';
    console.log('🎵 MusicMap V2.1 chargé');
</script>
</body>
</html>
